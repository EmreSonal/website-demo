<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Death By Media — Download</title>
<meta name="description" content="Download Death By Media — Portable or Installer for Windows">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --font-display: 'Clash Display', 'Inter', sans-serif;
    --font-body: 'Inter', 'Helvetica Neue', sans-serif;

    --text-xs:   clamp(0.75rem,  0.7rem  + 0.25vw, 0.875rem);
    --text-sm:   clamp(0.875rem, 0.8rem  + 0.35vw, 1rem);
    --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
    --text-lg:   clamp(1.125rem, 1rem    + 0.75vw, 1.5rem);
    --text-xl:   clamp(1.5rem,   1.2rem  + 1.25vw, 2.25rem);
    --text-2xl:  clamp(2rem,     1.2rem  + 2.5vw,  3.5rem);

    --space-1:  0.25rem;
    --space-2:  0.5rem;
    --space-3:  0.75rem;
    --space-4:  1rem;
    --space-6:  1.5rem;
    --space-8:  2rem;
    --space-10: 2.5rem;
    --space-12: 3rem;
    --space-16: 4rem;

    --color-bg: #0f0e18;
    --color-surface: rgba(255, 255, 255, 0.04);
    --color-surface-hover: rgba(255, 255, 255, 0.07);
    --color-border: rgba(255, 255, 255, 0.08);
    --color-border-hover: rgba(138, 112, 220, 0.4);
    --color-text: #e8e6f0;
    --color-text-muted: rgba(232, 230, 240, 0.55);
    --color-text-faint: rgba(232, 230, 240, 0.3);
    --color-accent: #7c5cbf;
    --color-accent-light: #9b7ee6;
    --color-accent-glow: rgba(124, 92, 191, 0.25);

    --radius-md: 0.625rem;
    --radius-lg: 0.875rem;
    --radius-xl: 1.25rem;

    --transition-fast: 180ms cubic-bezier(0.16, 1, 0.3, 1);
    --transition-smooth: 350ms cubic-bezier(0.16, 1, 0.3, 1);

    --shadow-glow: 0 0 40px rgba(124, 92, 191, 0.15);
    --shadow-btn: 0 2px 12px rgba(0,0,0,0.3);
    --shadow-btn-hover: 0 4px 24px rgba(124, 92, 191, 0.3);
  }

  html {
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    scroll-behavior: smooth;
  }

  body {
    min-height: 100dvh;
    font-family: var(--font-body);
    font-size: var(--text-base);
    color: var(--color-text);
    background-color: var(--color-bg);
    line-height: 1.6;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* Background */
  .bg-layer {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: url('assets/bg.jpg') center center / cover no-repeat;
    opacity: 0.35;
  }
  .bg-layer::after {
    content: '';
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(ellipse at 50% 80%, rgba(124, 92, 191, 0.12) 0%, transparent 60%),
      linear-gradient(180deg, rgba(15, 14, 24, 0.6) 0%, rgba(15, 14, 24, 0.2) 40%, rgba(15, 14, 24, 0.7) 100%);
  }

  /* Noise texture overlay */
  .noise {
    position: fixed;
    inset: 0;
    z-index: 1;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 128px 128px;
    pointer-events: none;
  }

  /* Back button */
  .back-btn {
    position: fixed;
    top: var(--space-4);
    left: var(--space-6);
    z-index: 100;
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    padding: 0;
    background: none;
    border: none;
    color: var(--color-text-muted);
    font-size: var(--text-sm);
    font-weight: 500;
    text-decoration: none;
    transition: color var(--transition-fast);
    cursor: pointer;
  }
  .back-btn:hover {
    color: var(--color-text);
  }
  .back-btn svg {
    width: 14px;
    height: 14px;
    opacity: 0.7;
  }

  /* Repo button */
  .repo-btn {
    position: fixed;
    top: var(--space-4);
    right: var(--space-6);
    z-index: 100;
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    padding: var(--space-2) var(--space-3);
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    color: var(--color-text-muted);
    font-size: var(--text-sm);
    font-weight: 500;
    text-decoration: none;
    transition: all var(--transition-fast);
    cursor: pointer;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .repo-btn:hover {
    color: var(--color-text);
    background: var(--color-surface-hover);
    border-color: var(--color-border-hover);
  }
  .repo-btn svg {
    width: 16px;
    height: 16px;
    opacity: 0.8;
  }

  /* Main content */
  .main {
    position: relative;
    z-index: 2;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: var(--space-8) var(--space-6);
    min-height: 100dvh;
  }

  .portal {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    max-width: 560px;
    width: 100%;
  }

  /* Logo */
  .logo-wrapper {
    width: 120px;
    height: 120px;
    margin-bottom: var(--space-8);
    position: relative;
    animation: floatIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .logo-wrapper::before {
    content: '';
    position: absolute;
    inset: -12px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--color-accent-glow) 0%, transparent 70%);
    filter: blur(16px);
    animation: pulse 4s ease-in-out infinite;
  }
  .logo-wrapper img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 4px 20px rgba(124, 92, 191, 0.3));
  }

  /* Title */
  .title {
    font-family: var(--font-display);
    font-size: var(--text-2xl);
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: var(--space-3);
    background: linear-gradient(135deg, #e8e6f0 0%, #9b7ee6 50%, #e8e6f0 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 6s ease-in-out infinite, fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
  }

  .subtitle {
    font-size: var(--text-sm);
    color: var(--color-text-muted);
    margin-bottom: var(--space-10);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 500;
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
  }

  /* Version badge */
  .version {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    padding: var(--space-1) var(--space-3);
    border-radius: 9999px;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    font-size: var(--text-xs);
    color: var(--color-text-muted);
    margin-bottom: var(--space-8);
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.25s both;
  }
  .version .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #6daa45;
    box-shadow: 0 0 6px rgba(109, 170, 69, 0.5);
  }

  /* Buttons */
  .buttons {
    display: flex;
    gap: var(--space-3);
    width: 100%;
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.35s both;
  }

  .btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--space-2);
    padding: var(--space-4) var(--space-4);
    border-radius: var(--radius-lg);
    text-decoration: none;
    font-family: var(--font-body);
    transition: all var(--transition-fast);
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    opacity: 0;
    transition: opacity var(--transition-fast);
  }

  .btn-primary {
    background: linear-gradient(135deg, #7c5cbf 0%, #5a3d9e 100%);
    border: 1px solid rgba(155, 126, 230, 0.3);
    box-shadow: var(--shadow-btn), 0 0 0 0 rgba(124, 92, 191, 0);
    color: #fff;
  }
  .btn-primary::before {
    background: linear-gradient(135deg, #9b7ee6 0%, #7c5cbf 100%);
  }
  .btn-primary:hover {
    box-shadow: var(--shadow-btn-hover), 0 0 0 1px rgba(155, 126, 230, 0.2);
    transform: translateY(-2px);
    border-color: rgba(155, 126, 230, 0.5);
  }
  .btn-primary:hover::before {
    opacity: 1;
  }
  .btn-primary:active {
    transform: translateY(0);
  }

  .btn-secondary {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    color: var(--color-text);
    box-shadow: var(--shadow-btn);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .btn-secondary:hover {
    background: var(--color-surface-hover);
    border-color: var(--color-border-hover);
    box-shadow: var(--shadow-btn-hover);
    transform: translateY(-2px);
  }
  .btn-secondary:active {
    transform: translateY(0);
  }

  .btn-icon {
    position: relative;
    z-index: 1;
    width: 28px;
    height: 28px;
    color: currentColor;
    opacity: 0.85;
  }

  .btn-label {
    position: relative;
    z-index: 1;
    font-size: var(--text-sm);
    font-weight: 600;
    letter-spacing: 0.01em;
  }

  .btn-meta {
    position: relative;
    z-index: 1;
    font-size: var(--text-xs);
    opacity: 0.5;
    font-weight: 400;
  }

  /* Minimal info */
  .info {
    margin-top: var(--space-8);
    font-size: var(--text-xs);
    color: var(--color-text-faint);
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.45s both;
    text-align: center;
    line-height: 1.8;
  }

  /* Footer */
  .footer {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: var(--space-6);
    font-size: var(--text-xs);
  }
  .footer a {
    color: var(--color-text-faint);
    text-decoration: none;
    transition: color var(--transition-fast);
  }
  .footer a:hover {
    color: var(--color-text-muted);
  }

  /* Animations */
  @keyframes floatIn {
    from { opacity: 0; transform: translateY(20px) scale(0.9); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.05); }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  /* Mobile */
  @media (max-width: 520px) {
    .buttons { flex-direction: column; }
    .logo-wrapper { width: 96px; height: 96px; }
    .main { padding: var(--space-6) var(--space-4); }
    .back-btn {
      top: var(--space-3);
      left: var(--space-4);
    }
    .repo-btn {
      top: var(--space-3);
      right: var(--space-4);
    }
  }
</style>
</head>

<script data-pplx-inline-edit>
(function(){
  if(window===window.top)return;
  function inlineAll(orig,clone){
    if(orig.nodeType!==1)return;
    try{
      var cs=getComputedStyle(orig);
      var t='';
      for(var i=0;i<cs.length;i++){t+=cs[i]+':'+cs.getPropertyValue(cs[i])+';';}
      clone.style.cssText=t;
    }catch(e){}
    var oc=orig.children,cc=clone.children;
    for(var j=0;j<oc.length&&j<cc.length;j++){inlineAll(oc[j],cc[j]);}
  }
  function stripExternal(clone){
    var imgs=clone.querySelectorAll('img');
    for(var i=0;i<imgs.length;i++){
      var s=imgs[i].getAttribute('src');
      if(s&&!s.startsWith('data:'))imgs[i].removeAttribute('src');
    }
    var all=clone.querySelectorAll('*');
    for(var i=0;i<all.length;i++){
      var st=all[i].style.cssText;
      if(st&&st.indexOf('url(')>=0){
        all[i].style.cssText=st.replace(/url\(["']?(?!data:)[^)"']*["']?\)/gi,'none');
      }
    }
  }
  window.addEventListener('message',function(e){
    if(!e.data||e.data.type!=='INLINE_EDIT_CAPTURE_REQUEST')return;
    var scrollX=window.scrollX||window.pageXOffset||0;
    var scrollY=window.scrollY||window.pageYOffset||0;
    var w=window.innerWidth,h=window.innerHeight;
    try{
      var clone=document.documentElement.cloneNode(true);
      var rm=clone.querySelectorAll('script,link[rel="stylesheet"],style');
      for(var i=0;i<rm.length;i++){rm[i].remove();}
      inlineAll(document.documentElement,clone);
      stripExternal(clone);
      var html=new XMLSerializer().serializeToString(clone);
      var svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'">'
        +'<foreignObject width="100%" height="100%">'
        +'<div xmlns="http://www.w3.org/1999/xhtml" style="width:'+w+'px;height:'+h+'px;overflow:hidden">'
        +'<div style="transform:translate(-'+scrollX+'px,-'+scrollY+'px);transform-origin:top left">'
        +html+'</div></div></foreignObject></svg>';
      var svgUrl='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
      var img=new Image();
      img.onload=function(){
        var c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0);
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:c.toDataURL('image/png'),scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.onerror=function(){
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.src=svgUrl;
    }catch(err){
      window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
    }
  });
})();
